<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チェックリスト</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-main: #f7f3ec;
      --bg-sub: #ece7df;
      --app-glass: rgba(255, 253, 248, 0.78);
      --paper: #fffdf8;
      --paper-2: #faf7f2;
      --ink: #1f2933;
      --line: #e7dfd4;
      --accent: #2563eb;
      --side-top: #15171a;
      --side-bottom: #24272d;
      --gold: #d6a84f;
      --number-bg: #2563eb;
      --number-text: #ffffff;
      --partial-bg: #fff7ed;
      --partial-line: #fdba74;
      --partial-text: #9a3412;
      --done-bg: #eeeae4;
      --done-line: #d6cec2;
      --done-text: #a39a90;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --warn-bg: #fef3c7;
      --warn-text: #854d0e;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(214, 168, 79, 0.18), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(37, 99, 235, 0.11), transparent 30%),
        linear-gradient(135deg, var(--bg-main), var(--bg-sub));
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
    }

    .app {
      width: 100%;
      max-width: 1220px;
      background: var(--app-glass);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 34px;
      box-shadow: 0 34px 90px rgba(42, 36, 29, 0.16);
      backdrop-filter: blur(14px);
      padding: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .list-panel {
      min-width: 0;
      background: var(--paper);
      border: 1px solid rgba(231, 223, 212, 0.92);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 18px 42px rgba(42, 36, 29, 0.07);
    }

    .summary {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #43382d;
      background: linear-gradient(135deg, #fffaf0, #f5efe5);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px 14px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: grid;
      grid-template-columns: 40px 64px minmax(0, 1fr) auto 42px;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #eadfd1;
      border-left: 6px solid var(--accent);
      border-radius: 18px;
      padding: 11px 10px 9px;
      box-shadow: 0 14px 28px rgba(31, 41, 51, 0.08);
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    li:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(31, 41, 51, 0.11);
    }

    li.partial {
      background: var(--partial-bg);
      border-color: var(--partial-line);
      border-left-color: var(--partial-line);
      box-shadow: 0 12px 24px rgba(251, 146, 60, 0.14);
    }

    li.partial .todo-number {
      background: var(--partial-line);
      color: #431407;
    }

    li.partial .todo-text {
      color: var(--partial-text);
    }

    li.completed {
      background: var(--done-bg);
      border-color: var(--done-line);
      border-left-color: var(--done-text);
      transform: translateX(44px);
      opacity: 0.58;
      box-shadow: none;
    }

    li.completed:hover {
      transform: translateX(44px);
      box-shadow: none;
    }

    .todo-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--number-bg);
      color: var(--number-text);
      font-weight: 900;
      font-size: 13px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    }

    li.completed .todo-number {
      background: var(--done-line);
      color: var(--done-text);
      box-shadow: none;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .check-pair {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding-top: 2px;
    }

    .check-cell {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 4px;
      min-width: 26px;
      overflow: visible;
    }

    .check-label {
      display: block;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.25;
      color: #7c6f64;
      max-width: 46px;
      min-height: 13px;
      overflow: visible;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    li.partial .check-label {
      color: var(--partial-text);
    }

    li.completed .check-label {
      color: var(--done-text);
    }

    .check-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: rgba(255,255,255,0.72);
      border: 1px solid #e7dfd4;
    }

    li.partial .check-wrap {
      border-color: var(--partial-line);
      background: rgba(255, 247, 237, 0.9);
    }

    li.completed .check-wrap {
      border-color: var(--done-line);
      background: rgba(255,255,255,0.55);
    }

    .todo-text {
      word-break: break-word;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.01em;
      min-width: 0;
      border-radius: 11px;
      padding: 5px 7px;
      outline: none;
      cursor: text;
    }

    .todo-text:hover { background: #f7f3ec; }

    .todo-text:focus {
      background: #ffffff;
      box-shadow: inset 0 0 0 2px var(--accent);
      text-decoration: none !important;
      color: var(--ink) !important;
    }

    li.completed .todo-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .sort-btns {
      display: flex;
      gap: 5px;
    }

    button { font-family: inherit; }

    .move-btn,
    .delete-btn,
    .filter-btn,
    .undo-btn,
    .clear-btn,
    .add-btn,
    .theme-reset-btn,
    .theme-toggle-btn,
    .file-btn {
      border: none;
      border-radius: 13px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .move-btn:hover:not(:disabled),
    .delete-btn:hover:not(:disabled),
    .filter-btn:hover:not(:disabled),
    .undo-btn:hover:not(:disabled),
    .clear-btn:hover:not(:disabled),
    .add-btn:hover:not(:disabled),
    .theme-reset-btn:hover:not(:disabled),
    .theme-toggle-btn:hover:not(:disabled),
    .file-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .move-btn:active:not(:disabled),
    .delete-btn:active:not(:disabled),
    .filter-btn:active:not(:disabled),
    .undo-btn:active:not(:disabled),
    .clear-btn:active:not(:disabled),
    .add-btn:active:not(:disabled),
    .theme-reset-btn:active:not(:disabled),
    .theme-toggle-btn:active:not(:disabled),
    .file-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      box-shadow: none;
    }

    .move-btn {
      background: #f0ece5;
      color: #43382d;
      min-width: 32px;
    }

    .delete-btn {
      background: #f3f0eb;
      color: #7c6f64;
      min-width: 38px;
    }


    .drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: #f3f0eb;
      color: #7c6f64;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      cursor: grab;
      touch-action: none;
      user-select: none;
      padding: 6px 8px;
      border-radius: 11px;
      min-width: 34px;
      grid-column: 5 / 6;
      align-self: center;
      justify-self: center;
    }

    .drag-handle:active {
      cursor: grabbing;
      background: var(--accent);
      color: var(--number-text);
    }

    .sort-btns {
      display: none !important;
    }

    .drag-float {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 2147483647;
      background: #ffffff !important;
      border: 1px solid #eadfd1;
      border-left: 6px solid var(--accent);
      border-radius: 18px;
      box-shadow:
        0 28px 64px rgba(15, 23, 42, 0.36),
        0 12px 26px rgba(15, 23, 42, 0.22);
      opacity: 1 !important;
      visibility: visible !important;
      will-change: transform;
    }

    .drag-float > * {
      opacity: 1 !important;
      visibility: visible !important;
    }

    .drag-float .delete-btn,
    .drag-float .sort-btns {
      display: none !important;
    }

    .drag-source {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    li.drop-before {
      margin-top: 42px;
      box-shadow:
        0 -7px 0 var(--accent),
        0 14px 28px rgba(31, 41, 51, 0.08);
    }

    li.drop-after {
      margin-bottom: 42px;
      box-shadow:
        0 7px 0 var(--accent),
        0 14px 28px rgba(31, 41, 51, 0.08);
    }

    .empty {
      text-align: center;
      color: #9a9187;
      background: var(--paper-2);
      border: 1px dashed #d8d0c5;
      border-radius: 22px;
      padding: 38px 8px;
      font-size: 15px;
    }

    .side-panel {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      scrollbar-width: thin;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.06), transparent 35%),
        linear-gradient(180deg, var(--side-top), var(--side-bottom));
      color: #ffffff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 24px 58px rgba(21, 23, 26, 0.3);
    }

    .side-panel::before {
      content: "";
      display: block;
      width: 64px;
      height: 4px;
      background: var(--gold);
      border-radius: 99px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      letter-spacing: 0.035em;
      line-height: 1.32;
    }

    .editable-title {
      display: inline-block;
      width: 100%;
      border-radius: 15px;
      padding: 6px 7px;
      outline: none;
      cursor: text;
      color: #ffffff;
    }

    .editable-title:hover { background: rgba(255, 255, 255, 0.08); }

    .editable-title:focus {
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 2px rgba(214, 168, 79, 0.78);
    }

    .input-area {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
    }

    #todoInput {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 17px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    #todoInput::placeholder { color: rgba(255, 255, 255, 0.48); }

    #todoInput:focus {
      border-color: rgba(214, 168, 79, 0.8);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(214, 168, 79, 0.14);
    }

    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, #e7c873, #d6a84f);
      color: #1c1917;
      box-shadow: 0 14px 28px rgba(214, 168, 79, 0.25);
      padding: 11px 14px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-box {
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 18px;
      padding: 12px;
      backdrop-filter: blur(4px);
    }

    .control-label {
      display: block;
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.72);
    }

    .filter-btns,
    .file-btns {
      display: grid;
      gap: 7px;
    }

    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .filter-btn,
    .file-btn {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.82);
      text-align: left;
    }

    .filter-btn.active {
      background: #ffffff;
      color: #15171a;
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.13);
    }

    .undo-btn {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .clear-btn {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .setting-row {
      display: grid;
      gap: 7px;
    }

    .setting-row label {
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      font-weight: 800;
    }

    .setting-row select,
    .setting-row input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 13px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .setting-row select option {
      color: #111827;
      background: #ffffff;
    }

    .theme-toggle-btn {
      width: 100%;
      background: rgba(255,255,255,0.10);
      color: #ffffff;
      text-align: left;
    }

    .theme-grid {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }

    .theme-grid.open { display: grid; }

    .theme-row {
      display: grid;
      grid-template-columns: 1fr 54px;
      align-items: center;
      gap: 10px;
    }

    .theme-row label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.88);
    }

    .theme-row input[type="color"] {
      width: 54px;
      height: 32px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
    }

    .theme-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }

    .theme-row input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
    }

    .theme-reset-btn {
      width: 100%;
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      margin-top: 10px;
    }

    .hint {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.58);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      body { padding: 20px 12px; }

      .app {
        padding: 14px;
        border-radius: 24px;
      }

      .layout { grid-template-columns: 1fr; }


      li {
        grid-template-columns: 28px 52px minmax(0, 1fr) 36px;
        position: relative;
        overflow: hidden;
        touch-action: pan-y;
      }

      .drag-handle {
        grid-column: 4 / 5;
        grid-row: 1 / 3;
        min-width: 30px;
        padding: 5px 7px;
        font-size: 17px;
        z-index: 5;
      }

      .delete-btn {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 82px;
        min-width: 82px;
        border-radius: 0 14px 14px 0;
        background: linear-gradient(135deg, #f87171, #dc2626);
        color: #ffffff;
        transform: translateX(100%);
        transition: transform 0.18s ease;
        z-index: 4;
        pointer-events: none;
        font-size: 0;
      }

      .delete-btn::before {
        content: "🗑️";
        font-size: 24px;
        line-height: 1;
      }

      li.swiped {
        padding-right: 82px;
        box-shadow: 0 12px 26px rgba(220, 38, 38, 0.16);
      }

      li.swiped .delete-btn {
        transform: translateX(0);
        pointer-events: auto;
      }

      li.drop-before {
        margin-top: 34px;
        box-shadow:
          0 -6px 0 var(--accent),
          0 8px 16px rgba(31, 41, 51, 0.07);
      }

      li.drop-after {
        margin-bottom: 34px;
        box-shadow:
          0 6px 0 var(--accent),
          0 8px 16px rgba(31, 41, 51, 0.07);
      }

      .side-panel {
        position: static;
        order: -1;
        max-height: none;
        overflow: visible;
      }

      .list-panel { padding: 18px; }

      li { grid-template-columns: 36px 64px minmax(0, 1fr); }

      li.completed { transform: translateX(20px); }

      li.completed:hover { transform: translateX(20px); }

      .sort-btns,
      .delete-btn { grid-column: 3 / 4; }

      .sort-btns { justify-self: start; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="layout">
      <section class="list-panel" aria-label="Todoリスト">
        <p class="summary" id="summary"></p>
        <ul id="todoList"></ul>
        <div class="empty" id="emptyMessage">まだTodoはありません。</div>
      </section>

      <aside class="side-panel" aria-label="操作パネル">
        <h1>
          <span id="appTitle" class="editable-title" contenteditable="true" title="クリックしてタイトルを編集">チェックリスト</span>
        </h1>

        <div class="input-area">
          <input id="todoInput" type="text" placeholder="やることを入力" autocomplete="off" />
          <button class="add-btn" id="addBtn">＋ 追加する</button>
        </div>

        <div class="controls">
          <div class="control-box">
            <span class="control-label">CHECK</span>
            <div class="setting-btns">
              <div class="setting-row">
                <label for="checkCountSelect">チェック数</label>
                <select id="checkCountSelect">
                  <option value="1">1つ</option>
                  <option value="2">2つ</option>
                </select>
              </div>
              <div class="setting-row">
                <label for="checkLabel1Input">チェック1の名前</label>
                <input id="checkLabel1Input" type="text" placeholder="例：実施" />
              </div>
              <div class="setting-row" id="checkLabel2Row">
                <label for="checkLabel2Input">チェック2の名前</label>
                <input id="checkLabel2Input" type="text" placeholder="例：確認" />
              </div>
            </div>
          </div>

          <div class="control-box">
            <span class="control-label">VIEW</span>
            <div class="filter-btns">
              <button class="filter-btn active" data-filter="all">全部</button>
              <button class="filter-btn" data-filter="active">未完了</button>
              <button class="filter-btn" data-filter="completed">完了</button>
            </div>
          </div>

          <div class="control-box">
            <span class="control-label">ACTION</span>
            <div class="action-btns">
              <button class="undo-btn" id="undoBtn" disabled>1つ戻る</button>
              <button class="undo-btn" id="redoBtn" disabled>1つ進む</button>
            </div>
            <div class="action-btns" style="margin-top: 7px;">
              <button class="clear-btn" id="clearCompletedBtn" style="grid-column: 1 / -1;">完了を削除</button>
            </div>
          </div>

          <div class="control-box">
            <span class="control-label">FILE</span>
            <div class="file-btns">
              <button class="file-btn" id="saveHtmlBtn">名前を付けてHTML保存</button>
            </div>
            <p class="hint">保存したHTMLを別PCで開くと、同じ内容で使えます。</p>
          </div>

          <div class="control-box">
            <span class="control-label">COLOR</span>
            <button class="theme-toggle-btn" id="themeToggleBtn">カラー設定を開く</button>
            <div class="theme-grid" id="themeGrid">
              <div class="theme-row">
                <label for="colorAccent">アクセント</label>
                <input type="color" id="colorAccent" />
              </div>
              <div class="theme-row">
                <label for="colorBgMain">背景色</label>
                <input type="color" id="colorBgMain" />
              </div>
              <div class="theme-row">
                <label for="colorPaper">左側カード</label>
                <input type="color" id="colorPaper" />
              </div>
              <div class="theme-row">
                <label for="colorSideTop">右側上部</label>
                <input type="color" id="colorSideTop" />
              </div>
              <div class="theme-row">
                <label for="colorSideBottom">右側下部</label>
                <input type="color" id="colorSideBottom" />
              </div>
              <div class="theme-row">
                <label for="colorDoneBg">完了項目</label>
                <input type="color" id="colorDoneBg" />
              </div>
              <button class="theme-reset-btn" id="themeResetBtn">初期配色に戻す</button>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script id="embeddedData" type="application/json">{"title":"チェックリスト","todos":[],"theme":{"accent":"#2563eb","bgMain":"#f7f3ec","paper":"#fffdf8","sideTop":"#15171a","sideBottom":"#24272d","doneBg":"#eeeae4"},"checkCount":2,"checkLabels":["チェック1","チェック2"]}</script>

  <script>
    const defaultTheme = {
      accent: "#2563eb",
      bgMain: "#f7f3ec",
      paper: "#fffdf8",
      sideTop: "#15171a",
      sideBottom: "#24272d",
      doneBg: "#eeeae4"
    };

    function normalizeCheckLabels(labels) {
      const source = Array.isArray(labels) ? labels : [];
      return [
        String(source[0] || "チェック1"),
        String(source[1] || "チェック2")
      ];
    }

    function normalizeTodos(todos) {
      return todos.map((todo, index) => {
        const checks = Array.isArray(todo.checks)
          ? [Boolean(todo.checks[0]), Boolean(todo.checks[1])]
          : [Boolean(todo.completed), Boolean(todo.completed)];
        return {
          id: typeof todo.id === "number" ? todo.id : Date.now() + index,
          text: String(todo.text || ""),
          checks
        };
      }).filter(todo => todo.text.trim());
    }

    function isTodoComplete(todo) {
      const checks = getTodoChecks(todo);
      if (checklist.checkCount === 1) return checks[0];
      return checks[0] && checks[1];
    }

    function isTodoPartial(todo) {
      const checks = getTodoChecks(todo);
      if (checklist.checkCount === 1) return false;
      return (checks[0] && !checks[1]) || (!checks[0] && checks[1]);
    }

    function getTodoStateClass(todo) {
      if (isTodoComplete(todo)) return "completed";
      if (isTodoPartial(todo)) return "partial";
      return "";
    }

    function getTodoChecks(todo) {
      if (!Array.isArray(todo.checks)) {
        todo.checks = [Boolean(todo.completed), Boolean(todo.completed)];
      }
      todo.checks = [Boolean(todo.checks[0]), Boolean(todo.checks[1])];
      return todo.checks;
    }

    function getInitialData() {
      try {
        const raw = document.getElementById("embeddedData").textContent.trim();
        const parsed = JSON.parse(raw);
        return {
          title: String(parsed.title || "チェックリスト"),
          todos: normalizeTodos(Array.isArray(parsed.todos) ? parsed.todos : []),
          theme: { ...defaultTheme, ...(parsed.theme || {}) },
          checkCount: parsed.checkCount === 1 ? 1 : 2,
          checkLabels: normalizeCheckLabels(parsed.checkLabels)
        };
      } catch {
        return {
          title: "チェックリスト",
          todos: [],
          theme: { ...defaultTheme }
        };
      }
    }

    let checklist = getInitialData();
    let history = [];
    let redoHistory = [];
    let currentFilter = "all";
    let editingTodoOriginalText = "";
    let dragState = null;
    let swipedTodoId = null;
    let touchStartX = 0;
    let touchStartY = 0;
    const historyLimit = 20;

    const appTitle = document.getElementById("appTitle");
    const todoInput = document.getElementById("todoInput");
    const addBtn = document.getElementById("addBtn");
    const todoList = document.getElementById("todoList");
    const summary = document.getElementById("summary");
    const emptyMessage = document.getElementById("emptyMessage");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const filterBtns = document.querySelectorAll(".filter-btn");
    const saveHtmlBtn = document.getElementById("saveHtmlBtn");
    const checkCountSelect = document.getElementById("checkCountSelect");
    const checkLabel1Input = document.getElementById("checkLabel1Input");
    const checkLabel2Input = document.getElementById("checkLabel2Input");
    const checkLabel2Row = document.getElementById("checkLabel2Row");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const themeGrid = document.getElementById("themeGrid");
    const colorAccent = document.getElementById("colorAccent");
    const colorBgMain = document.getElementById("colorBgMain");
    const colorPaper = document.getElementById("colorPaper");
    const colorSideTop = document.getElementById("colorSideTop");
    const colorSideBottom = document.getElementById("colorSideBottom");
    const colorDoneBg = document.getElementById("colorDoneBg");
    const themeResetBtn = document.getElementById("themeResetBtn");

    function hexToRgba(hex, alpha) {
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getReadableTextColor(hex) {
      const clean = hex.replace("#", "");
      const r = parseInt(clean.substring(0, 2), 16);
      const g = parseInt(clean.substring(2, 4), 16);
      const b = parseInt(clean.substring(4, 6), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 150 ? "#111827" : "#ffffff";
    }

    function applyTheme() {
      const theme = checklist.theme;
      const root = document.documentElement;
      root.style.setProperty("--accent", theme.accent);
      root.style.setProperty("--bg-main", theme.bgMain);
      root.style.setProperty("--paper", theme.paper);
      root.style.setProperty("--paper-2", theme.paper);
      root.style.setProperty("--side-top", theme.sideTop);
      root.style.setProperty("--side-bottom", theme.sideBottom);
      root.style.setProperty("--number-bg", theme.accent);
      root.style.setProperty("--number-text", getReadableTextColor(theme.accent));
      root.style.setProperty("--done-bg", theme.doneBg);
      root.style.setProperty("--done-line", hexToRgba(theme.doneBg, 0.85));
      root.style.setProperty("--done-text", "#a39a90");

      colorAccent.value = theme.accent;
      colorBgMain.value = theme.bgMain;
      colorPaper.value = theme.paper;
      colorSideTop.value = theme.sideTop;
      colorSideBottom.value = theme.sideBottom;
      colorDoneBg.value = theme.doneBg;
    }

    function renderCheckSettings() {
      checklist.checkCount = checklist.checkCount === 1 ? 1 : 2;
      checklist.checkLabels = normalizeCheckLabels(checklist.checkLabels);
      checkCountSelect.value = String(checklist.checkCount);
      checkLabel1Input.value = checklist.checkLabels[0];
      checkLabel2Input.value = checklist.checkLabels[1];
      checkLabel2Row.style.display = checklist.checkCount === 2 ? "grid" : "none";
    }

    function saveHistory() {
      history.push(JSON.stringify(checklist.todos));
      if (history.length > historyLimit) history.shift();
      redoHistory = [];
      swipedTodoId = null;
    }

    function updateHistoryButtons() {
      undoBtn.disabled = history.length === 0;
      redoBtn.disabled = redoHistory.length === 0;
    }

    function getFilteredTodos() {
      if (currentFilter === "active") return checklist.todos.filter(todo => !isTodoComplete(todo));
      if (currentFilter === "completed") return checklist.todos.filter(todo => isTodoComplete(todo));
      return checklist.todos;
    }

    function renderTitle() {
      appTitle.textContent = checklist.title;
      document.title = checklist.title;
    }


    function clearDropIndicators() {
      document.querySelectorAll("li.drop-before, li.drop-after").forEach(item => {
        item.classList.remove("drop-before", "drop-after");
      });
    }

    function getDropItems() {
      return Array.from(todoList.querySelectorAll("li[data-todo-id]"))
        .filter(item => !dragState || Number(item.dataset.todoId) !== dragState.todoId);
    }

    function getInsertIndex(clientY) {
      const items = getDropItems();
      for (let i = 0; i < items.length; i++) {
        const rect = items[i].getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) return i;
      }
      return items.length;
    }

    function showDropIndicator(insertIndex) {
      clearDropIndicators();
      const items = getDropItems();
      if (items.length === 0) return;

      if (insertIndex <= 0) {
        items[0].classList.add("drop-before");
      } else if (insertIndex >= items.length) {
        items[items.length - 1].classList.add("drop-after");
      } else {
        items[insertIndex].classList.add("drop-before");
      }
    }

    function startDrag(event, todoId, sourceLi) {
      if (event.button !== undefined && event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();

      const rect = sourceLi.getBoundingClientRect();
      const floatCard = sourceLi.cloneNode(true);
      floatCard.className = sourceLi.className.replace("swiped", "").replace("drag-source", "");
      floatCard.classList.add("drag-float");
      floatCard.style.width = rect.width + "px";
      floatCard.style.height = rect.height + "px";
      document.body.appendChild(floatCard);

      dragState = {
        todoId,
        sourceLi,
        floatCard,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        insertIndex: null
      };

      sourceLi.classList.add("drag-source");
      swipedTodoId = null;
      updateDrag(event.clientX, event.clientY);

      window.addEventListener("pointermove", onDragMove, { passive: false });
      window.addEventListener("pointerup", onDragEnd, { passive: false });
      window.addEventListener("pointercancel", onDragEnd, { passive: false });
    }

    function updateDrag(clientX, clientY) {
      if (!dragState) return;

      const x = clientX - dragState.offsetX;
      const y = clientY - dragState.offsetY;
      dragState.floatCard.style.transform = `translate3d(${x}px, ${y}px, 0)`;

      dragState.insertIndex = getInsertIndex(clientY);
      showDropIndicator(dragState.insertIndex);
    }

    function onDragMove(event) {
      if (!dragState) return;
      event.preventDefault();
      updateDrag(event.clientX, event.clientY);
    }

    function onDragEnd(event) {
      if (!dragState) return;
      event.preventDefault();

      updateDrag(event.clientX, event.clientY);

      const todoId = dragState.todoId;
      const insertIndex = dragState.insertIndex;

      dragState.floatCard.remove();
      document.querySelectorAll("li.drag-source").forEach(item => item.classList.remove("drag-source"));
      clearDropIndicators();

      window.removeEventListener("pointermove", onDragMove);
      window.removeEventListener("pointerup", onDragEnd);
      window.removeEventListener("pointercancel", onDragEnd);

      dragState = null;

      reorderTodoToIndex(todoId, insertIndex);
    }

    function reorderTodoToIndex(todoId, insertIndex) {
      const fromIndex = checklist.todos.findIndex(todo => todo.id === todoId);
      if (fromIndex === -1) {
        renderAll();
        return;
      }

      const moved = checklist.todos[fromIndex];
      const withoutMoved = checklist.todos.filter(todo => todo.id !== todoId);
      const safeIndex = Math.max(0, Math.min(Number(insertIndex), withoutMoved.length));

      const newTodos = [
        ...withoutMoved.slice(0, safeIndex),
        moved,
        ...withoutMoved.slice(safeIndex)
      ];

      const oldOrder = checklist.todos.map(todo => todo.id).join(",");
      const newOrder = newTodos.map(todo => todo.id).join(",");

      if (oldOrder !== newOrder) {
        saveHistory();
        checklist.todos = newTodos;
        swipedTodoId = null;
      }

      renderAll();
    }

    function renderTodos() {
      const filteredTodos = getFilteredTodos();
      todoList.innerHTML = "";

      filteredTodos.forEach(todo => {
        const originalIndex = checklist.todos.findIndex(item => item.id === todo.id);
        const li = document.createElement("li");
        li.className = getTodoStateClass(todo);
        if (swipedTodoId === todo.id) li.classList.add("swiped");
        li.dataset.todoId = String(todo.id);

        const number = document.createElement("span");
        number.className = "todo-number";
        number.textContent = originalIndex + 1;

        const checks = getTodoChecks(todo);
        const checkPair = document.createElement("div");
        checkPair.className = "check-pair";

        for (let checkIndex = 0; checkIndex < checklist.checkCount; checkIndex++) {
          const cell = document.createElement("div");
          cell.className = "check-cell";

          const label = document.createElement("span");
          label.className = "check-label";
          label.textContent = checklist.checkLabels[checkIndex] || `チェック${checkIndex + 1}`;
          label.title = label.textContent;

          const wrap = document.createElement("label");
          wrap.className = "check-wrap";
          wrap.title = label.textContent;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = checks[checkIndex];
          checkbox.addEventListener("change", () => toggleTodoCheck(todo.id, checkIndex));

          wrap.appendChild(checkbox);
          cell.appendChild(label);
          cell.appendChild(wrap);
          checkPair.appendChild(cell);
        }

        const span = document.createElement("span");
        span.className = "todo-text";
        span.textContent = todo.text;
        span.contentEditable = "true";
        span.title = "クリックしてリスト名を編集";

        span.addEventListener("focus", () => {
          editingTodoOriginalText = span.textContent;
        });

        span.addEventListener("blur", () => {
          editTodo(todo.id, span.textContent);
        });

        span.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            span.blur();
          }
          if (event.key === "Escape") {
            event.preventDefault();
            span.textContent = editingTodoOriginalText;
            span.blur();
          }
        });

        span.addEventListener("paste", insertPlainText);

        const sortBtns = document.createElement("div");
        sortBtns.className = "sort-btns";

        const upBtn = document.createElement("button");
        upBtn.className = "move-btn";
        upBtn.textContent = "↑";
        upBtn.title = "上へ移動";
        upBtn.disabled = originalIndex === 0;
        upBtn.addEventListener("click", () => moveTodo(todo.id, -1));

        const downBtn = document.createElement("button");
        downBtn.className = "move-btn";
        downBtn.textContent = "↓";
        downBtn.title = "下へ移動";
        downBtn.disabled = originalIndex === checklist.todos.length - 1;
        downBtn.addEventListener("click", () => moveTodo(todo.id, 1));

        sortBtns.appendChild(upBtn);
        sortBtns.appendChild(downBtn);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "削除";
        deleteBtn.addEventListener("click", event => {
          event.stopPropagation();
          deleteTodo(todo.id);
        });

        const dragHandle = document.createElement("button");
        dragHandle.className = "drag-handle";
        dragHandle.type = "button";
        dragHandle.textContent = "☰";
        dragHandle.title = "ドラッグして並べ替え";
        dragHandle.addEventListener("pointerdown", event => startDrag(event, todo.id, li));
        dragHandle.addEventListener("click", event => event.stopPropagation());

        li.addEventListener("touchstart", event => {
          if (event.target.closest(".drag-handle") || event.target.closest("button") || event.target.closest("input")) return;
          const touch = event.touches[0];
          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
        }, { passive: true });

        li.addEventListener("touchend", event => {
          if (event.target.closest(".drag-handle") || event.target.closest("button") || event.target.closest("input")) return;
          const touch = event.changedTouches[0];
          const dx = touch.clientX - touchStartX;
          const dy = touch.clientY - touchStartY;
          if (Math.abs(dx) > 34 && Math.abs(dx) > Math.abs(dy) * 1.4) {
            swipedTodoId = dx < 0 ? todo.id : null;
            renderTodos();
          }
        }, { passive: true });

        li.appendChild(number);
        li.appendChild(checkPair);
        li.appendChild(span);
        li.appendChild(sortBtns);
        li.appendChild(deleteBtn);
        li.appendChild(dragHandle);
        todoList.appendChild(li);
      });

      const completed = checklist.todos.filter(todo => isTodoComplete(todo)).length;
      const partial = checklist.todos.filter(todo => isTodoPartial(todo)).length;
      const untouched = checklist.todos.length - completed - partial;
      if (checklist.checkCount === 1) {
        summary.textContent = `未チェック：${untouched}件 / チェック済み：${completed}件`;
      } else {
        summary.textContent = `未チェック：${untouched}件 / 片方チェック：${partial}件 / 両方チェック：${completed}件`;
      }
      emptyMessage.style.display = filteredTodos.length === 0 ? "block" : "none";
      updateHistoryButtons();
    }

    function renderAll() {
      renderTitle();
      applyTheme();
      renderCheckSettings();
      renderTodos();
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      saveHistory();
      checklist.todos.push({ id: Date.now(), text, checks: [false, false] });
      todoInput.value = "";
      renderAll();
      todoInput.focus();
    }

    function toggleTodoCheck(id, checkIndex) {
      saveHistory();
      checklist.todos = checklist.todos.map(todo => {
        if (todo.id !== id) return todo;
        const checks = getTodoChecks(todo);
        checks[checkIndex] = !checks[checkIndex];
        return { ...todo, checks };
      });
      renderAll();
    }

    function editTodo(id, newText) {
      const text = newText.trim();
      const targetTodo = checklist.todos.find(todo => todo.id === id);
      if (!targetTodo) return;
      if (!text) {
        renderTodos();
        return;
      }
      if (text === targetTodo.text) return;
      saveHistory();
      checklist.todos = checklist.todos.map(todo =>
        todo.id === id ? { ...todo, text } : todo
      );
      renderAll();
    }

    function deleteTodo(id) {
      saveHistory();
      checklist.todos = checklist.todos.filter(todo => todo.id !== id);
      renderAll();
    }

    function clearCompleted() {
      const hasCompleted = checklist.todos.some(todo => isTodoComplete(todo));
      if (!hasCompleted) return;
      saveHistory();
      checklist.todos = checklist.todos.filter(todo => !isTodoComplete(todo));
      renderAll();
    }

    function moveTodo(id, direction) {
      const index = checklist.todos.findIndex(todo => todo.id === id);
      const newIndex = index + direction;
      if (index === -1 || newIndex < 0 || newIndex >= checklist.todos.length) return;
      saveHistory();
      const [movedTodo] = checklist.todos.splice(index, 1);
      checklist.todos.splice(newIndex, 0, movedTodo);
      renderAll();
    }

    function undoLastAction() {
      if (history.length === 0) return;
      redoHistory.push(JSON.stringify(checklist.todos));
      const previousTodos = history.pop();
      checklist.todos = JSON.parse(previousTodos);
      renderAll();
    }

    function redoLastAction() {
      if (redoHistory.length === 0) return;
      history.push(JSON.stringify(checklist.todos));
      const nextTodos = redoHistory.pop();
      checklist.todos = JSON.parse(nextTodos);
      renderAll();
    }

    function insertPlainText(event) {
      event.preventDefault();
      const text = event.clipboardData.getData("text/plain");
      document.execCommand("insertText", false, text);
    }

    function saveTitle() {
      checklist.title = appTitle.textContent.trim() || "チェックリスト";
      renderAll();
    }

    function syncCheckSettingsFromInputs() {
      checklist.checkCount = Number(checkCountSelect.value) === 1 ? 1 : 2;
      checklist.checkLabels = normalizeCheckLabels([
        checkLabel1Input.value.trim() || "チェック1",
        checkLabel2Input.value.trim() || "チェック2"
      ]);
    }

    function setActiveFilterButton() {
      filterBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === currentFilter);
      });
    }

    function safeFileName(name) {
      return (name || "チェックリスト")
        .replace(/[\\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "チェックリスト";
    }

    function buildSavedHtml() {
      syncCheckSettingsFromInputs();
      checklist.title = appTitle.textContent.trim() || "チェックリスト";
      renderTitle();

      const data = {
        title: checklist.title,
        todos: checklist.todos,
        theme: checklist.theme,
        checkCount: checklist.checkCount,
        checkLabels: checklist.checkLabels,
        savedAt: new Date().toISOString()
      };
      const json = JSON.stringify(data).replace(/</g, "\\u003c");
      const currentHtml = document.documentElement.outerHTML;
      const start = '<script id="embeddedData" type="application/json">';
      const end = '</scr' + 'ipt>';
      const pattern = new RegExp(start.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + '[\\s\\S]*?' + end.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
      const replacement = start + json + end;
      return "<!DOCTYPE html>\n" + currentHtml.replace(pattern, replacement);
    }

    function saveAsHtml() {
      const html = buildSavedHtml();
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${safeFileName(checklist.title)}.html`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    checkCountSelect.addEventListener("change", () => {
      saveHistory();
      checklist.checkCount = Number(checkCountSelect.value) === 1 ? 1 : 2;
      renderAll();
    });

    checkLabel1Input.addEventListener("input", () => {
      checklist.checkLabels[0] = checkLabel1Input.value.trim() || "チェック1";
      renderTodos();
    });

    checkLabel2Input.addEventListener("input", () => {
      checklist.checkLabels[1] = checkLabel2Input.value.trim() || "チェック2";
      renderTodos();
    });

    todoList.addEventListener("click", event => {
      if (event.target.closest(".delete-btn") || event.target.closest(".drag-handle")) return;
      if (swipedTodoId !== null) {
        swipedTodoId = null;
        renderTodos();
      }
    });

    themeToggleBtn.addEventListener("click", () => {
      const isOpen = themeGrid.classList.toggle("open");
      themeToggleBtn.textContent = isOpen ? "カラー設定を閉じる" : "カラー設定を開く";
    });

    appTitle.addEventListener("blur", saveTitle);
    appTitle.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        appTitle.blur();
      }
    });
    appTitle.addEventListener("paste", insertPlainText);

    addBtn.addEventListener("click", addTodo);
    undoBtn.addEventListener("click", undoLastAction);
    redoBtn.addEventListener("click", redoLastAction);
    clearCompletedBtn.addEventListener("click", clearCompleted);
    saveHtmlBtn.addEventListener("click", saveAsHtml);

    todoInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addTodo();
    });

    filterBtns.forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        setActiveFilterButton();
        renderTodos();
      });
    });

    colorAccent.addEventListener("input", e => {
      checklist.theme.accent = e.target.value;
      renderAll();
    });

    colorBgMain.addEventListener("input", e => {
      checklist.theme.bgMain = e.target.value;
      renderAll();
    });

    colorPaper.addEventListener("input", e => {
      checklist.theme.paper = e.target.value;
      renderAll();
    });

    colorSideTop.addEventListener("input", e => {
      checklist.theme.sideTop = e.target.value;
      renderAll();
    });

    colorSideBottom.addEventListener("input", e => {
      checklist.theme.sideBottom = e.target.value;
      renderAll();
    });

    colorDoneBg.addEventListener("input", e => {
      checklist.theme.doneBg = e.target.value;
      renderAll();
    });

    themeResetBtn.addEventListener("click", () => {
      checklist.theme = { ...defaultTheme };
      renderAll();
    });

    renderAll();
  </script>
</body>
</html>
