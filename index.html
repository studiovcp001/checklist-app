<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チェックリスト</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-main: #f7f3ec;
      --bg-sub: #ece7df;
      --app-glass: rgba(255, 253, 248, 0.78);
      --paper: #fffdf8;
      --paper-2: #faf7f2;
      --ink: #1f2933;
      --line: #e7dfd4;
      --accent: #2563eb;
      --side-top: #15171a;
      --side-bottom: #24272d;
      --gold: #d6a84f;
      --number-bg: #2563eb;
      --number-text: #ffffff;
      --partial-bg: #fff7ed;
      --partial-line: #fdba74;
      --partial-text: #9a3412;
      --done-bg: #eeeae4;
      --done-line: #d6cec2;
      --done-text: #a39a90;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --warn-bg: #fef3c7;
      --warn-text: #854d0e;
    }

    body {
      margin: 0;
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(214, 168, 79, 0.18), transparent 28%),
        radial-gradient(circle at 88% 78%, rgba(37, 99, 235, 0.11), transparent 30%),
        linear-gradient(135deg, var(--bg-main), var(--bg-sub));
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
    }

    .app {
      width: 100%;
      max-width: 1220px;
      background: var(--app-glass);
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 34px;
      box-shadow: 0 34px 90px rgba(42, 36, 29, 0.16);
      backdrop-filter: blur(14px);
      padding: 20px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .list-panel {
      min-width: 0;
      background: var(--paper);
      border: 1px solid rgba(231, 223, 212, 0.92);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 18px 42px rgba(42, 36, 29, 0.07);
    }

    .summary {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #43382d;
      background: linear-gradient(135deg, #fffaf0, #f5efe5);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px 14px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      display: grid;
      grid-template-columns: 40px var(--check-area-width, 118px) minmax(0, 1fr) auto 42px;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #eadfd1;
      border-left: 6px solid var(--accent);
      border-radius: 18px;
      padding: 11px 10px 9px;
      box-shadow: 0 14px 28px rgba(31, 41, 51, 0.08);
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    li:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(31, 41, 51, 0.11);
    }

    li.partial {
      background: var(--partial-bg);
      border-color: var(--partial-line);
      border-left-color: var(--partial-line);
      box-shadow: 0 12px 24px rgba(251, 146, 60, 0.14);
    }

    li.partial .todo-number {
      background: var(--partial-line);
      color: #431407;
    }

    li.partial .todo-text {
      color: var(--partial-text);
    }

    li.completed {
      background: var(--done-bg);
      border-color: var(--done-line);
      border-left-color: var(--done-text);
      transform: translateX(44px);
      opacity: 0.58;
      box-shadow: none;
    }

    li.completed:hover {
      transform: translateX(44px);
      box-shadow: none;
    }

    .todo-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: var(--number-bg);
      color: var(--number-text);
      font-weight: 900;
      font-size: 13px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    }

    li.completed .todo-number {
      background: var(--done-line);
      color: var(--done-text);
      box-shadow: none;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .check-pair {
      display: grid;
      grid-template-columns: repeat(3, minmax(20px, 1fr));
      align-items: center;
      justify-items: center;
      gap: 4px;
      padding-top: 0;
      width: 100%;
      max-width: 116px;
      align-self: center;
    }

    .check-cell {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 2px;
      min-width: 24px;
      max-width: 32px;
      overflow: visible;
    }

    .check-label {
      display: block;
      font-size: 9px;
      font-weight: 900;
      line-height: 1.1;
      color: #7c6f64;
      max-width: 32px;
      min-height: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    li.partial .check-label {
      color: var(--partial-text);
    }

    li.completed .check-label {
      color: var(--done-text);
    }

    .check-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 19px;
      height: 19px;
      border-radius: 7px;
      background: rgba(255,255,255,0.72);
      border: 1px solid #e7dfd4;
    }

    li.partial .check-wrap {
      border-color: var(--partial-line);
      background: rgba(255, 247, 237, 0.9);
    }

    li.completed .check-wrap {
      border-color: var(--done-line);
      background: rgba(255,255,255,0.55);
    }

    .todo-text {
      word-break: normal;
      overflow-wrap: anywhere;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.01em;
      min-width: 0;
      border-radius: 11px;
      padding: 4px 7px;
      outline: none;
      cursor: text;
      line-height: 1.35;
      align-self: center;
    }

    .todo-text:hover { background: #f7f3ec; }

    .todo-text:focus {
      background: #ffffff;
      box-shadow: inset 0 0 0 2px var(--accent);
      text-decoration: none !important;
      color: var(--ink) !important;
    }

    li.completed .todo-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .sort-btns {
      display: flex;
      gap: 5px;
    }

    button { font-family: inherit; }

    .move-btn,
    .delete-btn,
    .filter-btn,
    .undo-btn,
    .clear-btn,
    .add-btn,
    .theme-reset-btn,
    .theme-toggle-btn,
    .file-btn {
      border: none;
      border-radius: 13px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .move-btn:hover:not(:disabled),
    .delete-btn:hover:not(:disabled),
    .filter-btn:hover:not(:disabled),
    .undo-btn:hover:not(:disabled),
    .clear-btn:hover:not(:disabled),
    .add-btn:hover:not(:disabled),
    .theme-reset-btn:hover:not(:disabled),
    .theme-toggle-btn:hover:not(:disabled),
    .file-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .move-btn:active:not(:disabled),
    .delete-btn:active:not(:disabled),
    .filter-btn:active:not(:disabled),
    .undo-btn:active:not(:disabled),
    .clear-btn:active:not(:disabled),
    .add-btn:active:not(:disabled),
    .theme-reset-btn:active:not(:disabled),
    .theme-toggle-btn:active:not(:disabled),
    .file-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      box-shadow: none;
    }

    .move-btn {
      background: #f0ece5;
      color: #43382d;
      min-width: 32px;
    }

    .delete-btn {
      background: #f3f0eb;
      color: #7c6f64;
      min-width: 38px;
    }


    .mobile-add-btn,
    .mobile-settings-btn,
    .mobile-panel-backdrop,
    .mobile-panel-close {
      display: none;
    }

    .drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: #f3f0eb;
      color: #7c6f64;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      cursor: grab;
      touch-action: none;
      user-select: none;
      padding: 6px 8px;
      border-radius: 11px;
      min-width: 34px;
      grid-column: 5 / 6;
      align-self: center;
      justify-self: center;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .drag-handle:active {
      cursor: grabbing;
      background: var(--accent);
      color: var(--number-text);
      transform: scale(1.04);
    }

    .sort-btns {
      display: none !important;
    }



    .drag-placeholder {
      display: block;
      height: 54px;
      border-radius: 18px;
      border: 2px dashed color-mix(in srgb, var(--accent) 55%, #ffffff);
      background: color-mix(in srgb, var(--accent) 7%, #ffffff);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65);
      transition:
        transform 0.32s cubic-bezier(.16,1,.3,1),
        height 0.26s cubic-bezier(.16,1,.3,1),
        margin 0.26s cubic-bezier(.16,1,.3,1),
        opacity 0.22s ease;
    }

    .drag-source {
      display: none !important;
    }

    .drag-float {
      transform-origin: center center;
    }

    ul.dragging-list li:not(.drag-source) {
      transition:
        margin 0.28s cubic-bezier(.16,1,.3,1),
        padding 0.24s cubic-bezier(.16,1,.3,1),
        box-shadow 0.22s ease,
        background 0.2s ease;
    }

    .drag-float {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 2147483647;
      background: #ffffff !important;
      border: 1px solid #eadfd1;
      border-left: 6px solid var(--accent);
      border-radius: 18px;
      box-shadow:
        0 30px 70px rgba(15, 23, 42, 0.34),
        0 14px 30px rgba(15, 23, 42, 0.20);
      opacity: 1 !important;
      visibility: visible !important;
      will-change: transform;
      transition: none !important;
      animation: none !important;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .drag-float > * {
      opacity: 1 !important;
      visibility: visible !important;
    }

    .drag-float .delete-btn,
    .drag-float .sort-btns {
      display: none !important;
    }

    .drag-source {
      opacity: 0.08 !important;
      visibility: hidden !important;
    }

    li.drop-before {
      box-shadow:
        0 -5px 0 var(--accent),
        0 14px 28px rgba(31, 41, 51, 0.08);
    }

    li.drop-after {
      box-shadow:
        0 5px 0 var(--accent),
        0 14px 28px rgba(31, 41, 51, 0.08);
    }


    li.check-count-1 {
      --check-area-width: 42px;
    }

    li.check-count-2 {
      --check-area-width: 78px;
    }

    li.check-count-many {
      --check-area-width: 118px;
    }

    li.check-count-1 .check-pair {
      grid-template-columns: repeat(1, minmax(20px, 1fr));
      max-width: 40px;
    }

    li.check-count-2 .check-pair {
      grid-template-columns: repeat(2, minmax(20px, 1fr));
      max-width: 76px;
    }

    li.check-count-many .check-pair {
      grid-template-columns: repeat(3, minmax(20px, 1fr));
      max-width: 116px;
    }

    .empty {
      text-align: center;
      color: #9a9187;
      background: var(--paper-2);
      border: 1px dashed #d8d0c5;
      border-radius: 22px;
      padding: 38px 8px;
      font-size: 15px;
    }

    .side-panel {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      scrollbar-width: thin;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.06), transparent 35%),
        linear-gradient(180deg, var(--side-top), var(--side-bottom));
      color: #ffffff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 24px 58px rgba(21, 23, 26, 0.3);
    }

    .side-panel::before {
      content: "";
      display: block;
      width: 64px;
      height: 4px;
      background: var(--gold);
      border-radius: 99px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      letter-spacing: 0.035em;
      line-height: 1.32;
    }

    .editable-title {
      display: inline-block;
      width: 100%;
      border-radius: 15px;
      padding: 6px 7px;
      outline: none;
      cursor: text;
      color: #ffffff;
    }

    .editable-title:hover { background: rgba(255, 255, 255, 0.08); }

    .editable-title:focus {
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 2px rgba(214, 168, 79, 0.78);
    }

    .input-area {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
    }

    #todoInput {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 17px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    #todoInput::placeholder { color: rgba(255, 255, 255, 0.48); }

    #todoInput:focus {
      border-color: rgba(214, 168, 79, 0.8);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(214, 168, 79, 0.14);
    }

    .add-btn {
      width: 100%;
      background: linear-gradient(135deg, #e7c873, #d6a84f);
      color: #1c1917;
      box-shadow: 0 14px 28px rgba(214, 168, 79, 0.25);
      padding: 11px 14px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-box {
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 18px;
      padding: 12px;
      backdrop-filter: blur(4px);
    }

    .control-label {
      display: block;
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.72);
    }

    .filter-btns,
    .file-btns {
      display: grid;
      gap: 7px;
    }

    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .filter-btn,
    .file-btn {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.82);
      text-align: left;
    }

    .filter-btn.active {
      background: #ffffff;
      color: #15171a;
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.13);
    }

    .undo-btn {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .clear-btn {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .setting-row {
      display: grid;
      gap: 7px;
    }

    .setting-row label {
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      font-weight: 800;
    }

    .setting-row select,
    .setting-row input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 13px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .setting-row select option {
      color: #111827;
      background: #ffffff;
    }


    .check-label-editor {
      display: grid;
      gap: 8px;
    }

    .check-label-edit-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px;
      align-items: center;
    }

    .check-label-edit-row input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 13px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .check-label-delete-btn {
      border: none;
      border-radius: 11px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.82);
    }

    .check-label-delete-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .check-pair {
      grid-template-columns: repeat(3, minmax(20px, 1fr));
      max-width: 116px;
      width: 100%;
    }

    .theme-toggle-btn {
      width: 100%;
      background: rgba(255,255,255,0.10);
      color: #ffffff;
      text-align: left;
    }

    .theme-grid {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }

    .theme-grid.open { display: grid; }

    .theme-row {
      display: grid;
      grid-template-columns: 1fr 54px;
      align-items: center;
      gap: 10px;
    }

    .theme-row label {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.88);
    }

    .theme-row input[type="color"] {
      width: 54px;
      height: 32px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
    }

    .theme-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }

    .theme-row input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
    }

    .theme-reset-btn {
      width: 100%;
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      margin-top: 10px;
    }

    .hint {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.58);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      body {
        padding: 8px;
        padding-bottom: 86px;
      }

      .app {
        padding: 8px;
        border-radius: 20px;
      }

      .layout {
        display: block;
      }

      .list-panel {
        padding: 10px;
        border-radius: 20px;
      }

      .summary {
        margin: 0 0 8px;
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 13px;
      }

      ul {
        gap: 6px;
      }

      li {
        grid-template-columns: 28px var(--check-area-width-mobile, 104px) minmax(0, 1fr) 36px;
        gap: 5px;
        border-left-width: 5px;
        border-radius: 14px;
        padding: 5px 7px;
        position: relative;
        overflow: hidden;
        touch-action: pan-y;
        box-shadow: 0 8px 16px rgba(31, 41, 51, 0.07);
        transition:
          background 0.18s ease,
          transform 0.32s cubic-bezier(.16,1,.3,1),
          opacity 0.18s ease,
          box-shadow 0.24s ease,
          margin 0.26s cubic-bezier(.16,1,.3,1),
          padding 0.28s cubic-bezier(.16,1,.3,1);
      }

      li:hover {
        transform: none;
        box-shadow: 0 8px 16px rgba(31, 41, 51, 0.07);
      }

      li.completed {
        transform: translateX(8px);
      }

      li.completed:hover {
        transform: translateX(8px);
      }

      .todo-number {
        width: 24px;
        height: 24px;
        font-size: 11px;
      }

      .check-pair {
        gap: 4px;
        padding-top: 0;
      }

      .check-cell {
        min-width: 22px;
        max-width: 34px;
        gap: 1px;
      }

      .check-label {
        font-size: 8px;
        line-height: 1;
        min-height: 8px;
        max-width: 30px;
      }

      .check-wrap {
        width: 17px;
        height: 17px;
        border-radius: 6px;
      }

      input[type="checkbox"] {
        width: 13px;
        height: 13px;
      }

      .todo-text {
        font-size: 14px;
        padding: 3px 5px;
        border-radius: 9px;
        line-height: 1.25;
        min-height: 22px;
      }

      .sort-btns {
        display: none !important;
      }


      .check-pair {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
        justify-self: stretch;
        align-self: center;
        grid-template-columns: repeat(3, minmax(18px, 1fr));
        max-width: 104px;
        width: 100%;
        row-gap: 2px;
        column-gap: 3px;
        margin-top: 0;
      }

      .check-label-edit-row input {
        padding: 7px 9px;
        font-size: 12px;
      }

      .check-label-delete-btn {
        padding: 7px 9px;
        font-size: 12px;
      }


      .todo-number {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
        align-self: center;
      }

      .todo-text {
        grid-column: 3 / 4;
        grid-row: 1 / 2;
        align-self: center;
      }


      li.check-count-1 {
        --check-area-width-mobile: 38px;
      }

      li.check-count-2 {
        --check-area-width-mobile: 70px;
      }

      li.check-count-many {
        --check-area-width-mobile: 104px;
      }

      li.check-count-1 .check-pair {
        grid-template-columns: repeat(1, minmax(18px, 1fr));
        max-width: 36px;
      }

      li.check-count-2 .check-pair {
        grid-template-columns: repeat(2, minmax(18px, 1fr));

  <script id="embeddedData" type="application/json">{"title":"チェックリスト","todos":[],"theme":{"accent":"#2563eb","bgMain":"#f7f3ec","paper":"#fffdf8","sideTop":"#15171a","sideBottom":"#24272d","doneBg":"#eeeae4"},"checkCount":2,"checkLabels":["チェック1","チェック2"]}</script>

  <script>
    const defaultTheme = {
      accent: "#2563eb",
      bgMain: "#f7f3ec",
      paper: "#fffdf8",
      sideTop: "#15171a",
      sideBottom: "#24272d",
      doneBg: "#eeeae4"
    };

    function normalizeCheckLabels(labels) {
      const source = Array.isArray(labels) ? labels : [];
      const normalized = source
        .map((label, index) => String(label || `チェック${index + 1}`).trim())
        .filter(label => label.length > 0);

      return normalized.length > 0 ? normalized : ["チェック1"];
    }

    function normalizeTodosForLabels(todos, labels) {
      const checkLength = Math.max(1, normalizeCheckLabels(labels).length);

      return todos.map((todo, index) => {
        let checks;
        if (Array.isArray(todo.checks)) {
          checks = Array.from({ length: checkLength }, (_, checkIndex) => Boolean(todo.checks[checkIndex]));
        } else {
          checks = Array.from({ length: checkLength }, () => Boolean(todo.completed));
        }

        return {
          id: typeof todo.id === "number" ? todo.id : Date.now() + index,
          text: String(todo.text || ""),
          checks
        };
      }).filter(todo => todo.text.trim());
    }

    function ensureTodoCheckLength() {
      checklist.checkLabels = normalizeCheckLabels(checklist.checkLabels);
      const checkLength = checklist.checkLabels.length;

      checklist.todos = checklist.todos.map(todo => {
        const currentChecks = Array.isArray(todo.checks) ? todo.checks : [];
        return {
          ...todo,
          checks: Array.from({ length: checkLength }, (_, index) => Boolean(currentChecks[index]))
        };
      });
    }

    function isTodoComplete(todo) {
      const checks = getTodoChecks(todo);
      return checks.length > 0 && checks.every(Boolean);
    }

    function isTodoPartial(todo) {
      const checks = getTodoChecks(todo);
      return checks.some(Boolean) && !checks.every(Boolean);
    }

    function getTodoStateClass(todo) {
      if (isTodoComplete(todo)) return "completed";
      if (isTodoPartial(todo)) return "partial";
      return "";
    }

    function getTodoChecks(todo) {
      const checkLength = Math.max(1, normalizeCheckLabels(checklist.checkLabels).length);

      if (!Array.isArray(todo.checks)) {
        todo.checks = Array.from({ length: checkLength }, () => Boolean(todo.completed));
      }

      todo.checks = Array.from({ length: checkLength }, (_, index) => Boolean(todo.checks[index]));
      return todo.checks;
    }

    function getInitialData() {
      try {
        const raw = document.getElementById("embeddedData").textContent.trim();
        const parsed = JSON.parse(raw);
        return {
          title: String(parsed.title || "チェックリスト"),
          todos: normalizeTodos(Array.isArray(parsed.todos) ? parsed.todos : []),
          theme: { ...defaultTheme, ...(parsed.theme || {}) },
          checkCount: parsed.checkCount === 1 ? 1 : 2,
          checkLabels: normalizeCheckLabels(parsed.checkLabels)
        };
      } catch {
        return {
          title: "チェックリスト",
          todos: [],
          theme: { ...defaultTheme }
        };
      }
    }

    let checklist = getInitialData();
    let history = [];
    let redoHistory = [];
    let currentFilter = "all";
    let editingTodoOriginalText = "";
    let dragState = null;
    let swipedTodoId = null;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoved = false;
    const historyLimit = 20;

    const mobileAddBtn = document.getElementById("mobileAddBtn");
    const mobilePanelToggle = document.getElementById("mobilePanelToggle");
    const mobilePanelBackdrop = document.getElementById("mobilePanelBackdrop");
    const mobilePanelCloseBtn = document.getElementById("mobilePanelCloseBtn");
    const appTitle = document.getElementById("appTitle");
    const todoInput = document.getElementById("todoInput");
    const addBtn = document.getElementById("addBtn");
    const todoList = document.getElementById("todoList");
    const summary = document.getElementById("summary");
    const emptyMessage = document.getElementById("emptyMessage");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const filterBtns = document.querySelectorAll(".filter-btn");
    const saveHtmlBtn = document.getElementById("saveHtmlBtn");
    const checkLabelEditor = document.getElementById("checkLabelEditor");
    const addCheckLabelBtn = document.getElementById("addCheckLabelBtn");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const themeGrid = document.getElementById("themeGrid");
    const colorAccent = document.getElementById("colorAccent");
    const colorBgMain = document.getElementById("colorBgMain");
    const colorPaper = document.getElementById("colorPaper");
    const colorSideTop = document.getElementById("colorSideTop");
    const colorSideBottom = document.getElementById("colorSideBottom");
    const colorDoneBg = document.getElementById("colorDoneBg");
    const themeResetBtn = document.getElementById("themeResetBtn");

    function hexToRgba(hex, alpha) {
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getReadableTextColor(hex) {
      const clean = hex.replace("#", "");
      const r = parseInt(clean.substring(0, 2), 16);
      const g = parseInt(clean.substring(2, 4), 16);
      const b = parseInt(clean.substring(4, 6), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 150 ? "#111827" : "#ffffff";
    }

    function applyTheme() {
      const theme = checklist.theme;
      const root = document.documentElement;
      root.style.setProperty("--accent", theme.accent);
      root.style.setProperty("--bg-main", theme.bgMain);
      root.style.setProperty("--paper", theme.paper);
      root.style.setProperty("--paper-2", theme.paper);
      root.style.setProperty("--side-top", theme.sideTop);
      root.style.setProperty("--side-bottom", theme.sideBottom);
      root.style.setProperty("--number-bg", theme.accent);
      root.style.setProperty("--number-text", getReadableTextColor(theme.accent));
      root.style.setProperty("--done-bg", theme.doneBg);
      root.style.setProperty("--done-line", hexToRgba(theme.doneBg, 0.85));
      root.style.setProperty("--done-text", "#a39a90");

      colorAccent.value = theme.accent;
      colorBgMain.value = theme.bgMain;
      colorPaper.value = theme.paper;
      colorSideTop.value = theme.sideTop;
      colorSideBottom.value = theme.sideBottom;
      colorDoneBg.value = theme.doneBg;
    }

    function renderCheckSettings() {
      checklist.checkLabels = normalizeCheckLabels(checklist.checkLabels);
      ensureTodoCheckLength();

      checkLabelEditor.innerHTML = "";

      checklist.checkLabels.forEach((labelText, index) => {
        const row = document.createElement("div");
        row.className = "check-label-edit-row";

        const input = document.createElement("input");
        input.type = "text";
        input.value = labelText;
        input.placeholder = `チェック${index + 1}`;
        input.addEventListener("input", () => {
          checklist.checkLabels[index] = input.value.trim() || `チェック${index + 1}`;
          renderTodos();
        });

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "check-label-delete-btn";
        deleteButton.textContent = "削除";
        deleteButton.disabled = checklist.checkLabels.length <= 1;
        deleteButton.addEventListener("click", () => {
          removeCheckLabel(index);
        });

        row.appendChild(input);
        row.appendChild(deleteButton);
        checkLabelEditor.appendChild(row);
      });
    }

    function addCheckLabel() {
      checklist.checkLabels = normalizeCheckLabels(checklist.checkLabels);
      checklist.checkLabels.push(`チェック${checklist.checkLabels.length + 1}`);
      checklist.todos = checklist.todos.map(todo => ({
        ...todo,
        checks: [...getTodoChecks(todo), false]
      }));
      renderAll();
    }

    function removeCheckLabel(index) {
      checklist.checkLabels = normalizeCheckLabels(checklist.checkLabels);
      if (checklist.checkLabels.length <= 1) return;

      checklist.checkLabels.splice(index, 1);
      checklist.todos = checklist.todos.map(todo => {
        const checks = getTodoChecks(todo);
        checks.splice(index, 1);
        return { ...todo, checks };
      });
      renderAll();
    }

    function saveHistory() {
      history.push(JSON.stringify(checklist.todos));
      if (history.length > historyLimit) history.shift();
      redoHistory = [];
      swipedTodoId = null;
    }

    function updateHistoryButtons() {
      undoBtn.disabled = history.length === 0;
      redoBtn.disabled = redoHistory.length === 0;
    }

    function getFilteredTodos() {
      if (currentFilter === "active") return checklist.todos.filter(todo => !isTodoComplete(todo));
      if (currentFilter === "completed") return checklist.todos.filter(todo => isTodoComplete(todo));
      return checklist.todos;
    }

    function renderTitle() {
      appTitle.textContent = checklist.title;
      document.title = checklist.title;
    }


    function clearDropIndicators() {
      document.querySelectorAll("li.drop-before, li.drop-after").forEach(item => {
        item.classList.remove("drop-before", "drop-after");
      });
    }

    function getDraggableItems() {
      return Array.from(todoList.querySelectorAll("li[data-todo-id]"))
        .filter(item => !item.classList.contains("drag-source"));
    }

    function getPlaceholderIndex() {
      if (!dragState || !dragState.placeholder) return null;

      const children = Array.from(todoList.children);
      const placeholderIndex = children.indexOf(dragState.placeholder);
      if (placeholderIndex === -1) return null;

      // DOM上の位置ではなく、ガイドより前にある「実カード」だけを数える。
      // drag-sourceは、並べ替え時に元配列から抜かれるカードなので数えない。
      return children
        .slice(0, placeholderIndex)
        .filter(item =>
          item.matches &&
          item.matches("li[data-todo-id]") &&
          !item.classList.contains("drag-source")
        ).length;
    }

    function getInsertReference(clientY) {
      const items = getDraggableItems();

      for (const item of items) {
        const rect = item.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
          return item;
        }
      }

      return null;
    }


    function getAnimatedListElements() {
      return Array.from(todoList.children)
        .filter(item => item.matches && (item.matches("li[data-todo-id]") || item.classList.contains("drag-placeholder")))
        .filter(item => !item.classList.contains("drag-float"));
    }

    function captureListPositions() {
      const positions = new Map();
      getAnimatedListElements().forEach(item => {
        positions.set(item, item.getBoundingClientRect());
      });
      return positions;
    }

    function animateListReflow(beforePositions) {
      const items = getAnimatedListElements().filter(item => !item.classList.contains("drag-float"));

      items.forEach(item => {
        const before = beforePositions.get(item);
        if (!before) return;

        const after = item.getBoundingClientRect();
        const deltaX = before.left - after.left;
        const deltaY = before.top - after.top;

        if (Math.abs(deltaX) < 1 && Math.abs(deltaY) < 1) return;

        // 前回のアニメーションが残っていたら止める
        if (item._moveAnimation) {
          item._moveAnimation.cancel();
        }

        item._moveAnimation = item.animate(
          [
            { transform: `translate3d(${deltaX}px, ${deltaY}px, 0)` },
            { transform: "translate3d(0, 0, 0)" }
          ],
          {
            duration: 300,
            easing: "cubic-bezier(.16, 1, .3, 1)",
            fill: "both"
          }
        );

        item._moveAnimation.onfinish = () => {
          item._moveAnimation = null;
        };
      });
    }

    function movePlaceholder(clientY) {
      if (!dragState || !dragState.placeholder) return;

      const reference = getInsertReference(clientY);
      const placeholder = dragState.placeholder;

      if (reference) {
        if (reference === placeholder.nextSibling) return;

        const before = captureListPositions();
        todoList.insertBefore(placeholder, reference);
        animateListReflow(before);
        return;
      }

      if (placeholder === todoList.lastElementChild) return;

      const before = captureListPositions();
      todoList.appendChild(placeholder);
      animateListReflow(before);
    }

    function startDrag(event, todoId, sourceLi) {
      if (event.button !== undefined && event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();

      const rect = sourceLi.getBoundingClientRect();
      const floatCard = sourceLi.cloneNode(true);
      floatCard.className = sourceLi.className.replace("swiped", "").replace("drag-source", "");
      floatCard.classList.add("drag-float");
      floatCard.style.width = rect.width + "px";
      floatCard.style.height = rect.height + "px";
      floatCard.style.transition = "none";
      floatCard.style.animation = "none";
      floatCard.style.willChange = "transform";
      document.body.appendChild(floatCard);

      const placeholder = document.createElement("div");
      placeholder.className = "drag-placeholder";
      placeholder.style.height = rect.height + "px";
      todoList.insertBefore(placeholder, sourceLi.nextSibling);

      dragState = {
        todoId,
        sourceLi,
        floatCard,
        placeholder,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top
      };

      sourceLi.classList.add("drag-source");
      todoList.classList.add("dragging-list");
      swipedTodoId = null;
      updateDrag(event.clientX, event.clientY);

      window.addEventListener("pointermove", onDragMove, { passive: false });
      window.addEventListener("pointerup", onDragEnd, { passive: false });
      window.addEventListener("pointercancel", onDragCancel, { passive: false });
    }

    function updateDrag(clientX, clientY) {
      if (!dragState) return;

      const x = clientX - dragState.offsetX;
      const y = clientY - dragState.offsetY;
      dragState.floatCard.style.transition = "none";
      dragState.floatCard.style.transform = `translate3d(${x}px, ${y}px, 0)`;

      // 浮いているカード自身が判定の邪魔をしないように、実際のDOM内でplaceholderを動かす
      movePlaceholder(clientY);
    }

    function onDragMove(event) {
      if (!dragState) return;
      event.preventDefault();
      updateDrag(event.clientX, event.clientY);
    }

    function cleanupDrag() {
      if (!dragState) return;

      dragState.floatCard.remove();
      dragState.placeholder.remove();
      document.querySelectorAll("li.drag-source").forEach(item => item.classList.remove("drag-source"));
      todoList.classList.remove("dragging-list");
      clearDropIndicators();

      window.removeEventListener("pointermove", onDragMove);
      window.removeEventListener("pointerup", onDragEnd);
      window.removeEventListener("pointercancel", onDragCancel);
    }

    function onDragCancel(event) {
      if (!dragState) return;
      event.preventDefault();
      cleanupDrag();
      dragState = null;
      renderAll();
    }

    function onDragEnd(event) {
      if (!dragState) return;
      event.preventDefault();

      // 離した瞬間にガイドを再計算せず、表示中のガイド位置をそのまま採用する。
      const todoId = dragState.todoId;
      const insertIndex = getPlaceholderIndex();

      cleanupDrag();
      dragState = null;

      reorderTodoToIndex(todoId, insertIndex);
    }

    function reorderTodoToIndex(todoId, insertIndex) {
      const fromIndex = checklist.todos.findIndex(todo => todo.id === todoId);
      if (fromIndex === -1) {
        renderAll();
        return;
      }

      const moved = checklist.todos[fromIndex];
      const withoutMoved = checklist.todos.filter(todo => todo.id !== todoId);
      const safeIndex = Math.max(0, Math.min(Number(insertIndex), withoutMoved.length));

      const newTodos = [
        ...withoutMoved.slice(0, safeIndex),
        moved,
        ...withoutMoved.slice(safeIndex)
      ];

      const oldOrder = checklist.todos.map(todo => todo.id).join(",");
      const newOrder = newTodos.map(todo => todo.id).join(",");

      if (oldOrder !== newOrder) {
        saveHistory();
        checklist.todos = newTodos;
        swipedTodoId = null;
      }

      renderAll();
    }

    function openMobilePanel() {
      document.body.classList.add("panel-open");
      mobilePanelToggle.textContent = "閉じる";
      mobilePanelToggle.setAttribute("aria-label", "設定を閉じる");
    }

    function closeMobilePanel() {
      document.body.classList.remove("panel-open");
      mobilePanelToggle.textContent = "設定";
      mobilePanelToggle.setAttribute("aria-label", "設定を開く");
    }

    function toggleMobilePanel(event) {
      if (event) event.stopPropagation();
      if (document.body.classList.contains("panel-open")) {
        closeMobilePanel();
      } else {
        openMobilePanel();
      }
    }

    function addTodoMobile() {
      closeMobilePanel();
      const text = prompt("追加する項目名を入力してください");
      if (text === null) return;
      const cleanText = text.trim();
      if (!cleanText) return;
      saveHistory();
      checklist.todos.push({ id: Date.now(), text: cleanText, checks: Array.from({ length: checklist.checkLabels.length }, () => false) });
      renderAll();
    }

    function renderTodos() {
      const filteredTodos = getFilteredTodos();
      todoList.innerHTML = "";

      filteredTodos.forEach(todo => {
        const originalIndex = checklist.todos.findIndex(item => item.id === todo.id);
        const li = document.createElement("li");
        li.className = getTodoStateClass(todo);
        const checkCountClass = checklist.checkLabels.length === 1
          ? "check-count-1"
          : checklist.checkLabels.length === 2
            ? "check-count-2"
            : "check-count-many";
        li.classList.add(checkCountClass);
        if (swipedTodoId === todo.id) li.classList.add("swiped");
        li.dataset.todoId = String(todo.id);

        const number = document.createElement("span");
        number.className = "todo-number";
        number.textContent = originalIndex + 1;

        const checks = getTodoChecks(todo);
        const checkPair = document.createElement("div");
        checkPair.className = "check-pair";

        for (let checkIndex = 0; checkIndex < checklist.checkLabels.length; checkIndex++) {
          const cell = document.createElement("div");
          cell.className = "check-cell";

          const label = document.createElement("span");
          label.className = "check-label";
          label.textContent = checklist.checkLabels[checkIndex] || `チェック${checkIndex + 1}`;
          label.title = label.textContent;

          const wrap = document.createElement("label");
          wrap.className = "check-wrap";
          wrap.title = label.textContent;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = checks[checkIndex];
          checkbox.addEventListener("change", () => toggleTodoCheck(todo.id, checkIndex));

          wrap.appendChild(checkbox);
          cell.appendChild(label);
          cell.appendChild(wrap);
          checkPair.appendChild(cell);
        }

        const span = document.createElement("span");
        span.className = "todo-text";
        span.textContent = todo.text;
        span.contentEditable = "true";
        span.title = "クリックしてリスト名を編集";

        span.addEventListener("focus", () => {
          editingTodoOriginalText = span.textContent;
        });

        span.addEventListener("blur", () => {
          editTodo(todo.id, span.textContent);
        });

        span.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            span.blur();
          }
          if (event.key === "Escape") {
            event.preventDefault();
            span.textContent = editingTodoOriginalText;
            span.blur();
          }
        });

        span.addEventListener("paste", insertPlainText);

        const sortBtns = document.createElement("div");
        sortBtns.className = "sort-btns";

        const upBtn = document.createElement("button");
        upBtn.className = "move-btn";
        upBtn.textContent = "↑";
        upBtn.title = "上へ移動";
        upBtn.disabled = originalIndex === 0;
        upBtn.addEventListener("click", () => moveTodo(todo.id, -1));

        const downBtn = document.createElement("button");
        downBtn.className = "move-btn";
        downBtn.textContent = "↓";
        downBtn.title = "下へ移動";
        downBtn.disabled = originalIndex === checklist.todos.length - 1;
        downBtn.addEventListener("click", () => moveTodo(todo.id, 1));

        sortBtns.appendChild(upBtn);
        sortBtns.appendChild(downBtn);

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.type = "button";
        deleteBtn.setAttribute("aria-label", "削除");
        const deleteIcon = document.createElement("span");
        deleteIcon.className = "delete-icon";
        const deleteLabel = document.createElement("span");
        deleteLabel.className = "delete-label";
        deleteLabel.textContent = "削除";
        deleteBtn.appendChild(deleteIcon);
        deleteBtn.appendChild(deleteLabel);
        deleteBtn.addEventListener("click", event => {
          event.stopPropagation();
          deleteTodo(todo.id);
        });

        const dragHandle = document.createElement("button");
        dragHandle.className = "drag-handle";
        dragHandle.type = "button";
        dragHandle.textContent = "☰";
        dragHandle.title = "ドラッグして並べ替え";
        dragHandle.addEventListener("pointerdown", event => startDrag(event, todo.id, li));
        dragHandle.addEventListener("click", event => event.stopPropagation());

        li.addEventListener("touchstart", event => {
          if (event.target.closest(".drag-handle") || event.target.closest("button") || event.target.closest("input")) return;
          const touch = event.touches[0];
          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
          touchMoved = false;
        }, { passive: true });

        li.addEventListener("touchmove", event => {
          if (event.target.closest(".drag-handle") || event.target.closest("button") || event.target.closest("input")) return;
          const touch = event.touches[0];
          const dx = touch.clientX - touchStartX;
          const dy = touch.clientY - touchStartY;
          if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * 1.2) {
            touchMoved = true;
            if (dx < -18) {
              li.classList.add("swiping");
            }
          }
        }, { passive: true });

        li.addEventListener("touchend", event => {
          if (event.target.closest(".drag-handle") || event.target.closest("button") || event.target.closest("input")) return;
          const touch = event.changedTouches[0];
          const dx = touch.clientX - touchStartX;
          const dy = touch.clientY - touchStartY;
          li.classList.remove("swiping");
          if (Math.abs(dx) > 34 && Math.abs(dx) > Math.abs(dy) * 1.4) {
            swipedTodoId = dx < 0 ? todo.id : null;
            renderTodos();
          }
        }, { passive: true });

        const todoCard = document.createElement("div");
        todoCard.className = "todo-card";
        todoCard.appendChild(number);
        todoCard.appendChild(checkPair);
        todoCard.appendChild(span);
        todoCard.appendChild(sortBtns);
        todoCard.appendChild(dragHandle);

        li.appendChild(deleteBtn);
        li.appendChild(todoCard);
        todoList.appendChild(li);
      });

      const completed = checklist.todos.filter(todo => isTodoComplete(todo)).length;
      const partial = checklist.todos.filter(todo => isTodoPartial(todo)).length;
      const untouched = checklist.todos.length - completed - partial;
      if (checklist.checkLabels.length === 1) {
        summary.textContent = `未チェック：${untouched}件 / チェック済み：${completed}件`;
      } else {
        summary.textContent = `未チェック：${untouched}件 / 途中：${partial}件 / 完了：${completed}件`;
      }
      emptyMessage.style.display = filteredTodos.length === 0 ? "block" : "none";
      updateHistoryButtons();
    }

    function renderAll() {
      renderTitle();
      applyTheme();
      renderCheckSettings();
      renderTodos();
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      saveHistory();
      checklist.todos.push({ id: Date.now(), text, checks: Array.from({ length: checklist.checkLabels.length }, () => false) });
      todoInput.value = "";
      renderAll();
      todoInput.focus();
    }

    function toggleTodoCheck(id, checkIndex) {
      saveHistory();
      checklist.todos = checklist.todos.map(todo => {
        if (todo.id !== id) return todo;
        const checks = getTodoChecks(todo);
        checks[checkIndex] = !checks[checkIndex];
        return { ...todo, checks };
      });
      renderAll();
    }

    function editTodo(id, newText) {
      const text = newText.trim();
      const targetTodo = checklist.todos.find(todo => todo.id === id);
      if (!targetTodo) return;
      if (!text) {
        renderTodos();
        return;
      }
      if (text === targetTodo.text) return;
      saveHistory();
      checklist.todos = checklist.todos.map(todo =>
        todo.id === id ? { ...todo, text } : todo
      );
      renderAll();
    }

    function deleteTodo(id) {
      saveHistory();
      checklist.todos = checklist.todos.filter(todo => todo.id !== id);
      renderAll();
    }

    function clearCompleted() {
      const hasCompleted = checklist.todos.some(todo => isTodoComplete(todo));
      if (!hasCompleted) return;
      saveHistory();
      checklist.todos = checklist.todos.filter(todo => !isTodoComplete(todo));
      renderAll();
    }

    function moveTodo(id, direction) {
      const index = checklist.todos.findIndex(todo => todo.id === id);
      const newIndex = index + direction;
      if (index === -1 || newIndex < 0 || newIndex >= checklist.todos.length) return;
      saveHistory();
      const [movedTodo] = checklist.todos.splice(index, 1);
      checklist.todos.splice(newIndex, 0, movedTodo);
      renderAll();
    }

    function undoLastAction() {
      if (history.length === 0) return;
      redoHistory.push(JSON.stringify(checklist.todos));
      const previousTodos = history.pop();
      checklist.todos = JSON.parse(previousTodos);
      renderAll();
    }

    function redoLastAction() {
      if (redoHistory.length === 0) return;
      history.push(JSON.stringify(checklist.todos));
      const nextTodos = redoHistory.pop();
      checklist.todos = JSON.parse(nextTodos);
      renderAll();
    }

    function insertPlainText(event) {
      event.preventDefault();
      const text = event.clipboardData.getData("text/plain");
      document.execCommand("insertText", false, text);
    }

    function saveTitle() {
      checklist.title = appTitle.textContent.trim() || "チェックリスト";
      renderAll();
    }

    function syncCheckSettingsFromInputs() {
      const inputs = Array.from(checkLabelEditor.querySelectorAll("input"));
      checklist.checkLabels = normalizeCheckLabels(inputs.map((input, index) => input.value.trim() || `チェック${index + 1}`));
      ensureTodoCheckLength();
    }

    function setActiveFilterButton() {
      filterBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === currentFilter);
      });
    }

    function safeFileName(name) {
      return (name || "チェックリスト")
        .replace(/[\\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "チェックリスト";
    }

    function buildSavedHtml() {
      syncCheckSettingsFromInputs();
      checklist.title = appTitle.textContent.trim() || "チェックリスト";
      renderTitle();

      const data = {
        title: checklist.title,
        todos: checklist.todos,
        theme: checklist.theme,
        checkCount: checklist.checkLabels.length,
        checkLabels: checklist.checkLabels,
        savedAt: new Date().toISOString()
      };
      const json = JSON.stringify(data).replace(/</g, "\\u003c");
      const currentHtml = document.documentElement.outerHTML;
      const start = '<script id="embeddedData" type="application/json">';
      const end = '</scr' + 'ipt>';
      const pattern = new RegExp(start.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + '[\\s\\S]*?' + end.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
      const replacement = start + json + end;
      return "<!DOCTYPE html>\n" + currentHtml.replace(pattern, replacement);
    }

    function saveAsHtml() {
      const html = buildSavedHtml();
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${safeFileName(checklist.title)}.html`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    if (mobileAddBtn) mobileAddBtn.addEventListener("click", addTodoMobile);
    if (mobilePanelToggle) mobilePanelToggle.addEventListener("click", toggleMobilePanel);
    if (mobilePanelBackdrop) mobilePanelBackdrop.addEventListener("click", closeMobilePanel);
    if (mobilePanelCloseBtn) mobilePanelCloseBtn.addEventListener("click", closeMobilePanel);

    todoList.addEventListener("click", event => {
      if (event.target.closest(".delete-btn") || event.target.closest(".drag-handle")) return;
      if (swipedTodoId !== null) {
        swipedTodoId = null;
        renderTodos();
      }
    });

    if (addCheckLabelBtn) addCheckLabelBtn.addEventListener("click", addCheckLabel);

    themeToggleBtn.addEventListener("click", () => {
      const isOpen = themeGrid.classList.toggle("open");
      themeToggleBtn.textContent = isOpen ? "カラー設定を閉じる" : "カラー設定を開く";
    });

    appTitle.addEventListener("blur", saveTitle);
    appTitle.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        appTitle.blur();
      }
    });
    appTitle.addEventListener("paste", insertPlainText);

    addBtn.addEventListener("click", addTodo);
    undoBtn.addEventListener("click", undoLastAction);
    redoBtn.addEventListener("click", redoLastAction);
    clearCompletedBtn.addEventListener("click", clearCompleted);
    saveHtmlBtn.addEventListener("click", saveAsHtml);

    todoInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addTodo();
    });

    filterBtns.forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        setActiveFilterButton();
        renderTodos();
      });
    });

    colorAccent.addEventListener("input", e => {
      checklist.theme.accent = e.target.value;
      renderAll();
    });

    colorBgMain.addEventListener("input", e => {
      checklist.theme.bgMain = e.target.value;
      renderAll();
    });

    colorPaper.addEventListener("input", e => {
      checklist.theme.paper = e.target.value;
      renderAll();
    });

    colorSideTop.addEventListener("input", e => {
      checklist.theme.sideTop = e.target.value;
      renderAll();
    });

    colorSideBottom.addEventListener("input", e => {
      checklist.theme.sideBottom = e.target.value;
      renderAll();
    });

    colorDoneBg.addEventListener("input", e => {
      checklist.theme.doneBg = e.target.value;
      renderAll();
    });

    themeResetBtn.addEventListener("click", () => {
      checklist.theme = { ...defaultTheme };
      renderAll();
    });

    renderAll();
  </script>
</body>
</html>
